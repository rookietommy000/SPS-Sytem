version: '3.9'

# 開發環境
# 啟動：docker compose up
# 需先複製 .env.example 為 .env 並填入設定

services:
  postgres:
    image: postgres:16-alpine
    container_name: sps_db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sps_backend
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app          # 掛載原始碼，支援 hot-reload
      - /app/node_modules       # node_modules 不被覆蓋

  frontend:
    build: ./frontend
    container_name: sps_frontend
    env_file: .env
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
